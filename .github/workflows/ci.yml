name: CI

on:
  pull_request:
  push:
    branches: [main]

# A force-push on a PR cancels the previous run for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests + lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Hydrate config/.env from CI fixture
        run: cp config/.env.ci config/.env

      - name: Build dev image (with BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/django/Dockerfile
          target: development_build
          load: true
          tags: sitdown-rest:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DJANGO_ENV=development

      - name: Run full CI script (ruff, mypy, pytest, etc.)
        run: |
          docker compose run --user=root --rm web ./docker/django/ci.sh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
